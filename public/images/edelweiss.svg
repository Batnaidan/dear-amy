<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Paper cutout edelweiss flower -->
  <g fill="#F5F0E8" stroke="#C3AED6" stroke-width="1.5">
    <!-- Petals -->
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(135 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(225 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(270 50 50)"/>
    <ellipse cx="50" cy="25" rx="8" ry="18" transform="rotate(315 50 50)"/>
  </g>
  <!-- Center -->
  <circle cx="50" cy="50" r="10" fill="#F7E7A1" stroke="#D4C483" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="5" fill="#ECD76B"/>
</svg>
